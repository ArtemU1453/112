server:
  port: 8080

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/emergency-112}
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 20
            redis-rate-limiter.burstCapacity: 40
            key-resolver: "#{@userKeyResolver}"
      routes:
        - id: auth-service
          uri: ${AUTH_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/**
        - id: incident-service
          uri: ${INCIDENT_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/incidents/**
        - id: dispatch-service
          uri: ${DISPATCH_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/units/**,/api/v1/assignments/**
        - id: dispatch-incident-assignments
          uri: ${DISPATCH_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/incidents/*/assignments
        - id: telephony-service
          uri: ${TELEPHONY_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/calls/**
        - id: gis-service
          uri: ${GIS_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/gis/**
        - id: audit-service
          uri: ${AUDIT_URI:http://localhost:8086}
          predicates:
            - Path=/api/v1/audit/**
        - id: notification-service
          uri: ${NOTIFICATION_URI:http://localhost:8087}
          predicates:
            - Path=/api/v1/notifications/**
        - id: realtime-service
          uri: ${REALTIME_URI:http://localhost:8088}
          predicates:
            - Path=/ws/**
        - id: ai-service
          uri: ${AI_URI:http://localhost:8090}
          predicates:
            - Path=/api/v1/ai/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      probes:
        enabled: true
