server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: auth
          uri: http://auth-service:8080
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
        - id: incident
          uri: http://incident-service:8080
          predicates:
            - Path=/api/v1/incidents/**
          filters:
            - StripPrefix=2
        - id: dispatch
          uri: http://dispatch-service:8080
          predicates:
            - Path=/api/v1/dispatch/**
          filters:
            - StripPrefix=2
        - id: notification
          uri: http://notification-service:8080
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
        - id: protected-api
          uri: http://auth-service:8080
          predicates:
            - Path=/api/v1/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
  security:
    basic:
      enabled: false
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/112/protocol/openid-connect/certs
  redis:
    host: redis
    port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info

gateway:
  enabled: true
