databaseChangeLog:
  - changeSet:
      id: 001-create-audit-logs
      author: scaffold
      changes:
        - createTable:
            tableName: audit_logs
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: actor
                  type: varchar(255)
              - column:
                  name: action
                  type: varchar(255)
              - column:
                  name: details
                  type: text
              - column:
                  name: created_at
                  type: timestamp
