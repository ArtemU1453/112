databaseChangeLog:
  - changeSet:
      id: 001-create-notifications
      author: scaffold
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: type
                  type: varchar(255)
              - column:
                  name: message
                  type: text
              - column:
                  name: recipient
                  type: varchar(255)
              - column:
                  name: delivered
                  type: boolean
              - column:
                  name: created_at
                  type: timestamp
