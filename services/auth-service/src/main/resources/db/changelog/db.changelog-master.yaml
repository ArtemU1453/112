databaseChangeLog:
  - changeSet:
      id: 1
      author: copilot
      changes:
        - createTable:
            tableName: auth_service_user
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
              - column:
                  name: password_hash
                  type: varchar(255)
              - column:
                  name: role
                  type: varchar(64)
              - column:
                  name: enabled
                  type: boolean
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: updated_at
                  type: timestamp
