spring:
  datasource:
    url: jdbc:h2:mem:auth;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: sa
  liquibase:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
