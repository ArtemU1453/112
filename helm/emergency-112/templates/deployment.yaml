{{- range $name, $svc := .Values.services }}
{{- $defaults := $.Values.defaults }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "e112.labels" $ | nindent 4 }}
spec:
  {{- if not (and $svc.autoscaling $svc.autoscaling.enabled) }}
  replicas: {{ default $defaults.replicas $svc.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        {{- include "e112.labels" $ | nindent 8 }}
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.global.registry }}/{{ $svc.image }}:{{ $.Values.global.imageTag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          envFrom:
            - configMapRef:
                name: {{ include "e112.fullname" $ }}-config
            {{- if $svc.db }}
            - secretRef:
                name: {{ include "e112.fullname" $ }}-secrets
            {{- end }}
          env:
            {{- if $svc.db }}
            - name: DB_URL
              value: "jdbc:postgresql://{{ $.Values.infrastructure.postgresHost }}:{{ $.Values.infrastructure.postgresPort }}/{{ $svc.dbName }}"
            {{- end }}
            {{- if $svc.keycloakAdmin }}
            - name: KEYCLOAK_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "e112.fullname" $ }}-secrets
                  key: KEYCLOAK_ADMIN_USER
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "e112.fullname" $ }}-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            {{- end }}
            {{- range $key, $val := $svc.extraEnv }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- $healthPath := default "/actuator/health" $svc.healthPath }}
          livenessProbe:
            httpGet:
              path: {{ if $svc.healthPath }}{{ $svc.healthPath }}{{ else }}/actuator/health/liveness{{ end }}
              port: {{ $svc.port }}
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: {{ if $svc.healthPath }}{{ $svc.healthPath }}{{ else }}/actuator/health/readiness{{ end }}
              port: {{ $svc.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml (default $defaults.resources $svc.resources) | nindent 12 }}
{{- end }}
