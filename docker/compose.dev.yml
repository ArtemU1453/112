# ЕАСУР — инфраструктура для локальной разработки (Environment Governance Standard).
# Значения — dev-плейсхолдеры (НЕ секреты). Полный запуск системы — корневой docker-compose.yml.
name: easur-dev

networks:
  easur-dev-net:
    driver: bridge

volumes:
  dev-postgres:
  dev-redis:

services:
  postgres:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_USER: e112
      POSTGRES_PASSWORD: e112secret
      POSTGRES_DB: postgres
    ports: ["5432:5432"]
    volumes:
      - dev-postgres:/var/lib/postgresql/data
      - ../infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [easur-dev-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e112"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    ports: ["6379:6379"]
    volumes: [dev-redis:/data]
    networks: [easur-dev-net]

  kafka:
    image: bitnami/kafka:3.8
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports: ["9092:9092"]
    networks: [easur-dev-net]

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports: ["8180:8080"]
    volumes:
      - ../infrastructure/keycloak:/opt/keycloak/data/import:ro
    networks: [easur-dev-net]
