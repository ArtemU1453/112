# ЕАСУР — установка контейнерного рантайма (ADR-005/010). В air-gapped — из локального зеркала.
---
- name: Установить containerd
  ansible.builtin.package:
    name: containerd
    state: present

- name: Создать каталог конфигурации containerd
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Настроить containerd на использование systemd cgroup и локального реестра
  ansible.builtin.template:
    src: config.toml.j2
    dest: /etc/containerd/config.toml
    mode: "0644"
  notify: restart containerd
