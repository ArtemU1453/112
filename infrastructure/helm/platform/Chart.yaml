apiVersion: v2
name: easur-platform
description: Umbrella Helm chart for the 112 emergency services platform
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: gateway-service
    version: 0.1.0
    repository: "file://../../services/gateway-service/helm"
    condition: gatewayService.enabled
  - name: auth-service
    version: 0.1.0
    repository: "file://../../services/auth-service/helm"
    condition: authService.enabled
  - name: notification-service
    version: 0.1.0
    repository: "file://../../services/notification-service/helm"
    condition: notificationService.enabled
  - name: realtime-service
    version: 0.1.0
    repository: "file://../../services/realtime-service/helm"
    condition: realtimeService.enabled
  - name: dispatch-service
    version: 0.1.0
    repository: "file://../../services/dispatch-service/helm"
    condition: dispatchService.enabled
  - name: incident-service
    version: 0.1.0
    repository: "file://../../services/incident-service/helm"
    condition: incidentService.enabled
  - name: telephony-service
    version: 0.1.0
    repository: "file://../../services/telephony-service/helm"
    condition: telephonyService.enabled
  - name: gis-service
    version: 0.1.0
    repository: "file://../../services/gis-service/helm"
    condition: gisService.enabled
  - name: ai-service
    version: 0.1.0
    repository: "file://../../services/ai-service/helm"
    condition: aiService.enabled
  - name: audit-service
    version: 0.1.0
    repository: "file://../../services/audit-service/helm"
    condition: auditService.enabled
