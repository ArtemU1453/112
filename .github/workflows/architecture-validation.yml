name: architecture-validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Установка зависимостей валидаторов
        run: python -m pip install --upgrade pip pyyaml
      - name: Проверка структуры репозитория и правил (Repository Governance Standard)
        run: python scripts/validate_architecture.py
      - name: Проверка каталога версий (TVMS)
        run: python scripts/validate_versions.py
