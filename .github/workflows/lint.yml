name: lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: yamllint
        run: |
          python -m pip install --upgrade pip
          pip install "yamllint>=1.35"
          yamllint -c config/quality/yamllint.yml .

  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: markdownlint
        run: |
          npm install -g markdownlint-cli2
          markdownlint-cli2 --config config/quality/.markdownlint.jsonc "**/*.md" "#node_modules"

  dockerfiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: hadolint (Dockerfile lint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          config: config/quality/.hadolint.yaml

  frontend-eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
      - uses: actions/setup-node@v4
        if: steps.filter.outputs.frontend == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/dispatcher/package-lock.json
      - name: ESLint
        if: steps.filter.outputs.frontend == 'true'
        working-directory: frontend/dispatcher
        run: |
          npm ci
          npm run lint
