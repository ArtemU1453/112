# ЕАСУР — определения меток (Labels). Применяются инструментом синхронизации меток
# (например, github-label-sync) через workflow или вручную администратором репозитория.

# Типы (Backlog Structure)
- name: "type:bug"
  color: "d73a4a"
  description: "Дефект"
- name: "type:feature"
  color: "0e8a16"
  description: "Новая функциональность"
- name: "type:task"
  color: "1d76db"
  description: "Техническая задача"
- name: "type:spike"
  color: "5319e7"
  description: "Исследование/прототип"
- name: "type:tech-debt"
  color: "fbca04"
  description: "Технический долг"
- name: "type:adr"
  color: "0052cc"
  description: "Architecture Decision Record"
- name: "type:rfc"
  color: "0052cc"
  description: "Request for Change"

# Статусы (жизненный цикл задачи, Engineering Handbook)
- name: "status:triage"
  color: "ededed"
  description: "Требует первичной оценки"
- name: "status:ready"
  color: "c2e0c6"
  description: "Готова к работе (DoR выполнен)"
- name: "status:in-progress"
  color: "fbca04"
  description: "В работе"
- name: "status:blocked"
  color: "b60205"
  description: "Заблокирована зависимостью"
- name: "status:review"
  color: "d4c5f9"
  description: "На ревью"

# Приоритеты
- name: "priority:critical"
  color: "b60205"
  description: "Критический"
- name: "priority:high"
  color: "d93f0b"
  description: "Высокий"
- name: "priority:medium"
  color: "fbca04"
  description: "Средний"
- name: "priority:low"
  color: "0e8a16"
  description: "Низкий"

