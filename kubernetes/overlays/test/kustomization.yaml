# ЕАСУР — Kustomize overlay: test (Environment Governance Standard).
# Отличия окружения (namespace-суффикс, метки). Прикладные ресурсы разворачиваются Helm-чартом;
# оверлей управляет окружение-специфичной инфраструктурной обвязкой.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: test-
commonLabels:
  app.kubernetes.io/environment: test
