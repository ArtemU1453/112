# ЕАСУР — подключение к централизованному хранилищу секретов (ADR-011: Vault + External Secrets).
# РЕАЛЬНЫЕ СЕКРЕТЫ НЕ ХРАНЯТСЯ В GIT. Vault-адрес и аутентификация — из окружения кластера.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: emergency-112
spec:
  provider:
    vault:
      server: "https://vault.emergency-112-platform:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "emergency-112"
          serviceAccountRef:
            name: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: incident-db-credentials
  namespace: emergency-112
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: incident-db-credentials    # создаётся оператором как K8s Secret
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef:
        key: incident-service/db
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: incident-service/db
        property: password
