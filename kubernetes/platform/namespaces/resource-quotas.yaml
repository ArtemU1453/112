# ЕАСУР — ResourceQuota и LimitRange (High Availability / Capacity Management).
apiVersion: v1
kind: ResourceQuota
metadata:
  name: quota
  namespace: emergency-112
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "200"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: limits
  namespace: emergency-112
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "2"
        memory: 2Gi
