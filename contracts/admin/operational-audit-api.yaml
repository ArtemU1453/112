openapi: 3.1.0
info:
  title: ЕАСУР — Operational Audit API (admin)
  version: 1.0.0
  description: >
    Полный эксплуатационный аудит (Stage 5.10): действия пользователя/системы/ИИ, изменения данных/
    статусов/рекомендаций. Неизменяемо (append-only). Расширяет Audit Platform (Stage 4).
servers: [{ url: https://api.112.by/admin/operational-audit/v1 }]
paths:
  /audit:
    get:
      summary: Поиск операционных событий аудита
      parameters:
        - { name: actorType, in: query, schema: { type: string, enum: [USER, SYSTEM, AI] } }
        - { name: incidentId, in: query, schema: { type: string, format: uuid } }
        - { name: action, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
        - { name: page, in: query, schema: { type: integer, default: 0 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200':
          description: События
          content:
            application/json:
              schema:
                type: object
                properties:
                  content: { type: array, items: { $ref: '#/components/schemas/OperationalAuditEvent' } }
                  page: { $ref: '../shared/problem-detail.yaml#/components/schemas/Page' }
components:
  schemas:
    OperationalAuditEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        actorType: { type: string, enum: [USER, SYSTEM, AI] }
        actor: { type: string }
        action: { type: string }
        incidentId: { type: string, format: uuid }
        entityType: { type: string }
        before: { type: object, additionalProperties: true }
        after: { type: object, additionalProperties: true }
        timestamp: { type: string, format: date-time }
      required: [id, actorType, action, timestamp]
  securitySchemes: { bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT } }
security: [{ bearerAuth: [] }]
