openapi: 3.1.0
info:
  title: ЕАСУР — Interagency Data Exchange API (external)
  version: 1.0.0
  description: >
    Обмен данными с внешними системами (Stage 9.4). Sync/async, гарантированная доставка,
    дедупликация, контроль целостности, подтверждение обработки. Через интеграционную платформу.
servers: [{ url: https://gw.112.by/interagency/exchange/v1 }]
paths:
  /exchange:
    post:
      summary: Синхронный запрос обмена (идемпотентно)
      parameters:
        - { name: X-Message-Id, in: header, required: true, schema: { type: string } }
        - { name: X-Correlation-Id, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operation: { type: string }
                schemaVersion: { type: string }
                payload: { type: object, additionalProperties: true }
                checksum: { type: string }
              required: [operation, schemaVersion, payload]
      responses:
        '200':
          description: Результат (с подтверждением обработки)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [PROCESSED, REJECTED] }
                  result: { type: object, additionalProperties: true }
                  messageId: { type: string }
        '409': { description: Дубликат (дедупликация) }
components:
  securitySchemes:
    mutualTls: { type: mutualTLS }
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
security:
  - mutualTls: []
    bearerAuth: []
