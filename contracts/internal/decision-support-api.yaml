openapi: 3.1.0
info:
  title: ЕАСУР — Decision Support API (internal)
  version: 1.0.0
  description: >
    Поддержка принятия решений — advisory (Stage 5.7, Operational Decision Support Standard).
    Предложения классификации, недостающие данные, противоречия, дополнительные вопросы.
    Окончательное решение принимает диспетчер (AI Assistance Policy).
servers: [{ url: https://api.112.by/internal/decision-support/v1 }]
paths:
  /advice/{incidentId}:
    get:
      summary: Получить рекомендации-подсказки по карточке
      parameters: [{ name: incidentId, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200':
          description: Подсказки (не изменяют карточку)
          content: { application/json: { schema: { $ref: '#/components/schemas/DecisionAdvice' } } }
components:
  schemas:
    DecisionAdvice:
      type: object
      properties:
        suggestedTypes:
          type: array
          items: { type: object, properties: { type: { type: string }, probability: { type: number } } }
        missingData:
          type: array
          items: { type: string, description: Обязательная сущность, которой не хватает }
        contradictions:
          type: array
          items: { type: string }
        suggestedQuestions:
          type: array
          items: { type: string }
        note: { type: string, example: "Все подсказки требуют подтверждения диспетчером" }
  securitySchemes: { bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT } }
security: [{ bearerAuth: [] }]
