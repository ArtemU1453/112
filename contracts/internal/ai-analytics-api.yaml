openapi: 3.1.0
info:
  title: ЕАСУР — AI Analytics API (internal)
  version: 1.0.0
  description: >
    Аналитический слой ИИ через адаптеры (Stage 8.10, ADR-021). Классификация/кластеризация/
    закономерности/отклонения/сводки. Каждый результат — с объяснением и методикой (AI Explainability,
    Statistical Methodology). Модель не фиксируется (CAP-AIANALYTICS-001).
servers: [{ url: https://api.112.by/internal/ai-analytics/v1 }]
paths:
  /analyze:
    post:
      summary: Выполнить аналитическую задачу ИИ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                task: { type: string, enum: [CLASSIFICATION, CLUSTERING, PATTERN_MINING, ANOMALY_DETECTION, SUMMARIZATION] }
                dataset: { type: string }
                parameters: { type: object, additionalProperties: true }
              required: [task, dataset]
      responses:
        '200': { description: Результат, content: { application/json: { schema: { $ref: '#/components/schemas/AiAnalyticsResult' } } } }
components:
  schemas:
    AiAnalyticsResult:
      type: object
      properties:
        task: { type: string }
        result: { type: object, additionalProperties: true }
        explanation: { type: string, description: Объяснение (обязательно) }
        usedData: { type: array, items: { type: string }, description: Использованные данные (обязательно) }
        methodologyRef: { type: string, description: Документированная методика (обязательно) }
        confidence: { type: number, minimum: 0, maximum: 1 }
      required: [task, result, explanation, usedData, methodologyRef]
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
security:
  - bearerAuth: []
