openapi: 3.1.0
info:
  title: ЕАСУР — Data Warehouse API (internal)
  version: 1.0.0
  description: >
    Доступ к витринам, каталогу данных и качеству (Stage 8.6, ADR-019). Исторические данные
    неизменяемы; происхождение прослеживается (Data Lineage).
servers: [{ url: https://api.112.by/internal/dwh/v1 }]
paths:
  /catalog:
    get:
      summary: Каталог данных (витрины/поля/владельцы)
      responses: { '200': { description: Каталог, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/CatalogEntry' } } } } } }
  /marts/{mart}/query:
    post:
      summary: Запрос к витрине данных
      parameters: [{ name: mart, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dimensions: { type: array, items: { type: string } }
                measures: { type: array, items: { type: string } }
                filters: { type: object, additionalProperties: true }
      responses:
        '200':
          description: Строки
          content:
            application/json:
              schema: { type: array, items: { type: object, additionalProperties: true } }
components:
  schemas:
    CatalogEntry:
      type: object
      properties:
        mart: { type: string }
        field: { type: string }
        type: { type: string }
        owner: { type: string }
        lineageRef: { type: string }
      required: [mart, field]
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
security:
  - bearerAuth: []
