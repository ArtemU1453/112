# Toolchain Version Catalog — ЕАСУР
# SINGLE SOURCE OF TRUTH для версий инструментов, языков, платформ и ключевых библиотек.
# Никакие конкретные номера версий не дублируются в архитектурной/инженерной документации —
# все документы ссылаются на этот каталог (см. Toolchain Version Management Standard, TVMS,
# и Technology Abstraction Policy, TAP).
#
# category: LTS | Supported | Preview | Experimental | Deprecated | EndOfLife
# Каждая запись: min (мин. поддерживаемая), recommended (рекомендуемая), category.

